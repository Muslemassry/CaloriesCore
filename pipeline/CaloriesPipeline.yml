AWSTemplateFormatVersion: "2010-09-09"
Parameters:
  SourceCodeBucketName:
    Type: String
    Description: The name of the S3 bucket where the Lambda function code is stored
  SourceCodeS3Key:
    Type: String
    Description: The key of the S3 object containing the Lambda function code
  ZipFileName:
    Type: String
    Description: The name of the zip file containing the Lambda function code
    Default: lambda-code.zip
  environmentName:
    Type: String
    Description: The name of the environment to be deployed
    AllowedValues: [dev, uat ,prod]
  GitHubConnectionArn:
    Type: String
    Description: The ARN of the GitHub connection in AWS CodeStar Connections
    Default: arn:aws:codeconnections:us-east-1:864138843099:connection/379caa08-d2bb-44a8-8f28-5f361df0ca79
  FullRepositoryId:
    Type: String
    Description: The full repository ID in the format "owner/repository"
    Default: Muslemassry/CaloriesCore
  BranchName:
    Type: String
    Description: The branch name to be used in the pipeline
    Default: main
  buildVersion:
    Type: String
    Description: The version of the build to be deployed
    Default: V1
  UserPoolId:
    Type: String
    Description: "The ID of the Cognito User Pool"
  UploadingBucketName:
    Type: String
    Description: "The name of the S3 bucket for uploading files"
Resources:
  CodePipelineServiceRoleTopullfromGithub:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodePipelineServiceRoleTopullfromGithubPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${SourceCodeBucketName} 
                  - !Sub arn:aws:s3:::${SourceCodeBucketName}/*
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:DescribeStacks
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ValidateTemplate
                Resource: 
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}-${buildVersion}-${environmentName}-Core/*"
  CodeBuildServiceRoleToAccessS3:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildServiceRoleToAccessS3Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:GetBucketVersioning
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${SourceCodeBucketName} 
                  - !Sub arn:aws:s3:::${SourceCodeBucketName}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${AWS::StackName}-${buildVersion}-${environmentName}"
      Description: Build project for CodePipeline
      ServiceRole: !GetAtt CodeBuildServiceRoleToAccessS3.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0  # Adjust based on your runtime needs
        EnvironmentVariables:
          - Name: ENVIRONMENT
            Value: !Ref environmentName
          - Name: ARTIFACTS_BUCKET
            Value: !Ref SourceCodeBucketName
          - Name: CodeS3Key
            Value: !Ref SourceCodeS3Key
          - Name: ZipFileName
            Value: !Ref ZipFileName
      Source:
        Type: CODEPIPELINE
        BuildSpec: codeBuild.yml
      TimeoutInMinutes: 60
      QueuedTimeoutInMinutes: 480
  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${AWS::StackName}-${buildVersion}-${environmentName}"
      RoleArn: !GetAtt CodePipelineServiceRoleTopullfromGithub.Arn
      PipelineType: V2
      Triggers:
        - ProviderType: CodeStarSourceConnection
          GitConfiguration:
            SourceActionName: SourceAction
            Push:
              - Branches:
                  Includes:
                    - !Ref BranchName
      ArtifactStore:
        Type: S3
        Location: !Ref SourceCodeBucketName
      Stages:
        - Name: Source
          Actions:
            - Name: SourceAction
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: 1
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Ref FullRepositoryId
                BranchName: !Ref BranchName
              OutputArtifacts:
                - Name: SourceOutput
        - Name: Build
          Actions:
            - Name: BuildAction
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: 1
              Configuration:
                ProjectName: !Ref CodeBuildProject
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
        - Name: Deploy
          Actions:
            - Name: DeployAction
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: 1
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Sub "${AWS::StackName}-${buildVersion}-${environmentName}-Core"
                TemplatePath: BuildOutput::infrastructure/CaloriesCore.yml
                RoleArn: !GetAtt CloudFormationExecutionRole.Arn
                ParameterOverrides: !Sub |
                  {
                    "Environment": "${environmentName}",
                    "SourceCodeBucketName": "${SourceCodeBucketName}",
                    "SourceCodeS3Key": {"Fn::GetParam": ["BuildOutput", "params.json", "UniqueS3Key"]},
                    "LambdaVersion": "${buildVersion}",
                    "UserPoolId": "${UserPoolId}",
                    "UploadingBucketName": "${UploadingBucketName}"
                  }
                Capabilities: CAPABILITY_NAMED_IAM
              InputArtifacts:
                - Name: BuildOutput
  CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Path: /
      Policies:
        - PolicyName: CloudFormationExecutionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "*"
                Resource: "*"